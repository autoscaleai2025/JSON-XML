<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>JSON → XML Converter</title>

<style>
  body {
    background: #ffffff;
    font-family: Arial, sans-serif;
    max-width: 700px;
    margin: 40px auto;
    color: #2e2e2e;
  }

  textarea {
    width: 100%;
    height: 220px;
    font-family: monospace;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
  }

  button {
    padding: 12px 20px;
    margin-top: 15px;
    background: #2e2e2e;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  #status {
    margin-top: 20px;
    font-weight: bold;
  }

  #result {
    margin-top: 20px;
    padding: 15px;
    background: #f4f4f4;
    border-radius: 6px;
    font-family: monospace;
    white-space: pre-wrap;
  }
</style>
</head>

<body>

<h2>JSON → XML Converter</h2>

<textarea id="jsonInput" placeholder='{
  "name": "John",
  "car": "BMW"
}'></textarea>

<button onclick="convert()">Convert</button>

<div id="status"></div>
<div id="result"></div>

<script>
async function convert() {

  const status = document.getElementById("status");
  const result = document.getElementById("result");
  const input = document.getElementById("jsonInput").value;

  if (!input) {
    status.innerText = "Paste JSON first.";
    return;
  }

  let parsed;
  try {
    parsed = JSON.parse(input);
  } catch (e) {
    status.innerText = "Invalid JSON format.";
    return;
  }

  status.innerText = "Sending POST request...";
  result.innerText = "";

  try {

    const response = await fetch("https://hook.eu1.make.com/qmbregkgj0jkxssg2lvdzs33gbkcl4i5", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(parsed)
    });

    if (!response.ok) {
      status.innerText = "Server error: " + response.status;
      return;
    }

    const xmlText = await response.text();

    status.innerText = "Conversion complete.";
    result.innerText = xmlText;

  } catch (error) {
    status.innerText = "Error: " + error.message;
  }
}
</script>

</body>
</html>
