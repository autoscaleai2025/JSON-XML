<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Send JSON to Make</title>
  <style>
    body { font-family: Arial; max-width: 700px; margin: 40px auto; }
    textarea { width: 100%; height: 250px; font-family: monospace; }
    button { padding: 10px 20px; margin-top: 10px; }
    #status { margin-top: 15px; white-space: pre-wrap; }
  </style>
</head>
<body>

<h2>Send Raw JSON to Make Webhook</h2>

<textarea id="jsonInput" placeholder='Paste JSON here...
Example:
{
  "name": "John",
  "email": "john@email.com"
}'></textarea>

<br>
<button onclick="sendJSON()">Send</button>

<div id="status"></div>

<script>
async function sendJSON() {
  const status = document.getElementById("status");
  const input = document.getElementById("jsonInput").value;

  if (!input) {
    status.textContent = "Please paste JSON.";
    return;
  }

  let parsed;
  try {
    parsed = JSON.parse(input);
  } catch (e) {
    status.textContent = "Invalid JSON format.";
    return;
  }

  status.textContent = "Sending...";

  try {
    const response = await fetch("https://hook.eu1.make.com/i6kxslckblgkigm9shyzaseo5abdbli5", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(parsed)
    });

    if (response.ok) {
      status.textContent = "Sent successfully!";
    } else {
      status.textContent = "Error: " + response.status;
    }

  } catch (error) {
    status.textContent = "Network error: " + error.message;
  }
}
</script>

</body>
</html>
