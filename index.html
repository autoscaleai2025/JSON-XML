<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Send JSON to Make</title>

<style>
  body {
    background: #ffffff;
    font-family: Arial, sans-serif;
    max-width: 700px;
    margin: 40px auto;
    color: #2e2e2e; /* Dark gray main text */
  }

  h2 {
    color: #2e2e2e;
  }

  textarea {
    width: 100%;
    height: 260px;
    font-family: monospace;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
  }

  button {
    padding: 12px 20px;
    margin-top: 15px;
    background: #2e2e2e;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  button:hover {
    background: #444;
  }

  #status {
    margin-top: 15px;
    font-size: 14px;
  }
</style>
</head>

<body>

<h2>Send Raw JSON to Make Webhook</h2>

<textarea id="jsonInput" placeholder='{
  "name": "John",
  "car": "BMW",
  "price": 5000
}'></textarea>

<button onclick="sendJSON()">Send JSON</button>

<div id="status"></div>

<script>
async function sendJSON() {

  const status = document.getElementById("status");
  const input = document.getElementById("jsonInput").value;

  if (!input) {
    status.innerText = "Paste JSON first.";
    return;
  }

  let parsed;
  try {
    parsed = JSON.parse(input);
  } catch (e) {
    status.innerText = "Invalid JSON format.";
    return;
  }

  status.innerText = "Sending...";

  try {

    await fetch("https://hook.eu1.make.com/i6kxslckblgkigm9shyzaseo5abdbli5", {
      method: "POST",
      mode: "no-cors", // prevents CORS blocking
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(parsed)
    });

    status.innerText = "Sent. Check Make scenario (Run Once).";

  } catch (error) {
    status.innerText = "Network error: " + error.message;
  }
}
</script>

</body>
</html>
